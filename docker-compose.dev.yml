# ─── Development overlay ─────────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# - Mounts source code for hot-reload (Vite HMR + tsx watch)
# - No nginx — Vite dev server handles frontend + API proxy
# - Drizzle migrations run automatically before dev server starts
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "${BACKEND_PORT:-3001}:3001"
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      NODE_ENV: development
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prod_data
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app_node_modules:
